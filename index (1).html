const msgs=[
  "Você sabe o que isso é?",
  "Nós já sabemos quem você é.",
  "Algo está diminuindo.",
  "Você não vai conseguir explicar.",
  "Às 03:00 o tempo não anda para frente.",
  "Ainda não é hora.",
  "Mas está quase.",
  "O número tem uma lógica.",
  "Você consegue ouvir 3718.4 Hz?",
];
let mi=0,ci=0,typing=true,paused=false;
const tel=document.getElementById('typetext');
function typeStep(){
  if(paused)return;
  const t=msgs[mi];
  if(typing){
    if(ci<=t.length){tel.textContent=t.slice(0,ci++);}
    else{typing=false;paused=true;setTimeout(()=>{paused=false;},2600);return;}
  }else{
    if(ci>0){tel.textContent=t.slice(0,--ci);}
    else{
      typing=true;mi=(mi+1)%msgs.length;
      paused=true;setTimeout(()=>{paused=false;},350);return;
    }
  }
  setTimeout(typeStep,typing?52:26);
}
setTimeout(typeStep,1200);

// ── CLOCK ───────────────────────────────────────────────────
function updateClock(){
  const n=new Date(),p=x=>String(x).padStart(2,'0');
  document.getElementById('dateline').textContent=
    `${p(n.getDate())} / ${p(n.getMonth()+1)} / ${n.getFullYear()}`+
    `  ·  ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
}
setInterval(updateClock,1000);updateClock();

  {ph:'o que voce teme agora, neste momento',btn:'confessar'},
  {ph:'diga seu nome',btn:'revelar'},

  {ph:'o ultimo medo que voce teve antes de dormir',btn:'admitir'},
  {ph:'deixe algo aqui',btn:'—'},
];
const _ch=placeholders[Math.floor(Math.random()*placeholders.length)];
document.getElementById('inp').placeholder=_ch.ph;
document.getElementById('inpbtn').textContent=_ch.btn;

// ── NÚMERO — Lógica A+C+D ───────────────────────────────────
// Target: 31 de outubro — data secreta no código
// Puzzle: converter o valor em binário a cada hora revela letras de INEXPLICAVEL
const _t=(()=>{
  const y=new Date().getFullYear();
  let d=new Date(y,9,31,0,0,0);
  if(d<=new Date())d=new Date(y+1,9,31,0,0,0);
  return d;
})();

let currentVal=null;
let addingMode=false;

function getTickInterval(){
  const h=new Date().getHours();
  if(h===3)return -1;        // 03h → ADICIONA
  if(h>=4&&h<=6)return 3000; // 04h-06h → lento
  if(h===23)return 500;      // 23h → rápido
  return 1000;               // resto → normal
}

function initNumber(){
  const base=Math.floor((_t-new Date())/1000);
  currentVal=Math.max(0,base);
}

function getBinaryHint(){
  const letters="INEXPLICAVEL";
  const h=new Date().getHours();
  const letter=letters[h%letters.length];
  return letter.charCodeAt(0).toString(2).padStart(8,'0');
}

function getHourlyHint(){
  const h=new Date().getHours();
  if(h===3)return "03:00 — o tempo não anda para frente aqui";
  if(h>=4&&h<=6)return "algo desacelera nas primeiras horas";
  if(h===23)return "a meia-noite se aproxima — ele acelera";
  return "";
}

function updateNumber(){
  if(currentVal===null)initNumber();
  const numEl=document.getElementById('bignumber');
  const labelEl=document.getElementById('num-label');
  const hintEl=document.getElementById('num-hint');
  const binEl=document.getElementById('binhint');
  const interval=getTickInterval();
  if(interval<0){
    currentVal+=1;
    addingMode=true;
    numEl.className='big-number adding';
    labelEl.textContent='ALGO AUMENTA';
    hintEl.textContent='03:00 — o tempo não anda para frente';
  }else{
    if(currentVal>0)currentVal-=(interval<=500?2:1);
    addingMode=false;
    numEl.className='big-number';
    labelEl.textContent='ALGO DIMINUI';
    hintEl.textContent=getHourlyHint();
  }
  numEl.textContent=String(Math.max(0,currentVal)).padStart(8,'0');
  binEl.textContent=getBinaryHint();
  setTimeout(updateNumber,Math.abs(getTickInterval()));
}
setTimeout(()=>{
  document.getElementById('binhint').style.opacity='1';
},30000);
setTimeout(updateNumber,2000);

let lastFlash=0,flashCount=0;
function doFlash(){
  const now=Date.now();
  if(now-lastFlash<15000)return;
  lastFlash=now;flashCount++;
  const idx=flashCount%5===0?5:Math.floor(Math.random()*5);
  flashEl.innerHTML=fearImages[idx];
  const dur=80+Math.floor(Math.random()*80);
  flashEl.style.opacity='1';
  setTimeout(()=>{
    flashEl.style.opacity='0';
    setTimeout(()=>{flashEl.innerHTML='';},300);
  },dur);
}
function scheduleFlash(){
  const delay=20000+Math.floor(Math.random()*40000);
  setTimeout(()=>{doFlash();scheduleFlash();},delay);
}
scheduleFlash();

  ],
  keywords:{
    "jogo":"Isso é o que você acha que é?",

    "ola":"Nós já sabíamos que você ia dizer isso.",
    "olá":"Nós já sabíamos que você ia dizer isso.",
    "oi":"Nós já sabíamos que você ia dizer isso.",
    "hello":"We already knew you would say that.",
    "source":"Você está no caminho certo.",
    "fragmento":"Existem mais. Continue.",
    "coordenadas":"Você sabe o que está naquele lugar?",
    "são paulo":"Você sabe o que está naquele lugar?",
  }
};
function getResp(input){
  const low=input.toLowerCase().trim();
  for(const[k,v]of Object.entries(responses.keywords)){
    if(low.includes(k))return v;
  }
  return responses.default[Math.floor(Math.random()*responses.default.length)];
}
function submit(){
  const val=document.getElementById('inp').value.trim();
  if(!val)return;
  const box=document.getElementById('resp');
  box.style.display='block';box.textContent='';
  document.getElementById('inp').value='';
  document.getElementById('hint').textContent='mensagem recebida';
  const r=getResp(val);
  let i=0;
  const iv=setInterval(()=>{
    if(i<=r.length){box.textContent=r.slice(0,i++);}
    else{
      clearInterval(iv);
      setTimeout(()=>{
        document.getElementById('hint').textContent=
          'resposta não é garantida · mas alguém está ouvindo';
      },4000);
    }
  },38);
}
document.getElementById('inpbtn').addEventListener('click',submit);
document.getElementById('inp').addEventListener('keydown',e=>{
  if(e.key==='Enter')submit();
});

// ── ATALHOS DE TESTE (não documentados) ─────────────────────
// Shift+F → flash aleatório imediato
// Shift+1 a Shift+6 → imagem específica
// Shift+0 → mostra todas em sequência
document.addEventListener('keydown',e=>{
  if(!e.shiftKey)return;
  if(e.key==='F'||e.key==='f'){
    // força flash ignorando cooldown
    lastFlash=0;
    doFlash();
    return;
  }
  const n=parseInt(e.key);
  if(n>=1&&n<=6){
    // mostra imagem específica pelo índice
    const idx=n-1;
    flashEl.innerHTML=fearImages[idx];
    const dur=120+Math.floor(Math.random()*80);
    flashEl.style.opacity='1';
    setTimeout(()=>{
      flashEl.style.opacity='0';
      setTimeout(()=>{flashEl.innerHTML='';},300);
    },dur);
    return;
  }
  if(e.key==='0'||e.key===')'){
    // sequência completa com 1s entre cada
    fearImages.forEach((_,i)=>{
      setTimeout(()=>{
        flashEl.innerHTML=fearImages[i];
        flashEl.style.opacity='1';
        setTimeout(()=>{
          flashEl.style.opacity='0';
          setTimeout(()=>{flashEl.innerHTML='';},300);
        },200);
      },i*1200);
    });
  }
});
